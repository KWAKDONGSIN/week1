<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle dark/light mode">🌓</button>
        <header>
            <h1>Lotto Number Generator</h1>
        </header>
        <main>
            <div class="lotto-display">
                <!-- Lotto balls will be inserted here by JavaScript -->
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </main>
        <aside class="history">
            <h2>History</h2>
            <ul id="history-list">
                <!-- History of generated numbers will be inserted here -->
            </ul>
        </aside>
        <footer>
            <p>Built with Modern Web Tech</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
