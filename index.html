<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TPJJLWZC');</script>

    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TPJJLWZC"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle dark/light mode">🌓</button>
        <header>
            <h1>Lotto Number Generator</h1>
        </header>
        <main>
            <div class="lotto-display">
                <!-- Lotto balls will be inserted here by JavaScript -->
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </main>
        <aside class="history">
            <h2>History</h2>
            <ul id="history-list">
                <!-- History of generated numbers will be inserted here -->
            </ul>
        </aside>
        <section class="contact">
            <h2>제휴 문의</h2>
            <form id="contact-form" action="https://formspree.io/f/xpqbprop" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" placeholder="회사명을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력하세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
                <p id="form-status" class="form-status"></p>
            </form>
        </section>
        <section class="comments">
            <h2>댓글</h2>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://week1-6.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
        <footer>
            <p>Built with Modern Web Tech</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
